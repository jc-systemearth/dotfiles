# Catppuccin Mocha — https://github.com/catppuccin/alacritty
[colors.primary]
background = "#1E1E2E"  # base
foreground = "#CDD6F4"  # text
dim_foreground = "#CDD6F4"
bright_foreground = "#CDD6F4"

[colors.cursor]
text = "#1E1E2E"
cursor = "#F5E0DC"  # rosewater

[colors.vi_mode_cursor]
text = "#1E1E2E"
cursor = "#B4BEFE"  # lavender

[colors.search.matches]
foreground = "#1E1E2E"
background = "#A6ADC8"  # subtext0

[colors.search.focused_match]
foreground = "#1E1E2E"
background = "#A6E3A1"  # green

[colors.footer_bar]
foreground = "#1E1E2E"
background = "#A6ADC8"

[colors.hints.start]
foreground = "#1E1E2E"
background = "#F9E2AF"  # yellow

[colors.hints.end]
foreground = "#1E1E2E"
background = "#A6ADC8"

[colors.selection]
text = "#1E1E2E"
background = "#F5E0DC"  # rosewater

[colors.normal]
black   = "#45475A"  # surface1
red     = "#F38BA8"
green   = "#A6E3A1"
yellow  = "#F9E2AF"
blue    = "#89B4FA"
magenta = "#F5C2E7"  # pink
cyan    = "#94E2D5"  # teal
white   = "#BAC2DE"  # subtext1

[colors.bright]
black   = "#585B70"  # surface2
red     = "#F38BA8"
green   = "#A6E3A1"
yellow  = "#F9E2AF"
blue    = "#89B4FA"
magenta = "#F5C2E7"
cyan    = "#94E2D5"
white   = "#A6ADC8"  # subtext0

[colors.dim]
black   = "#45475A"
red     = "#F38BA8"
green   = "#A6E3A1"
yellow  = "#F9E2AF"
blue    = "#89B4FA"
magenta = "#F5C2E7"
cyan    = "#94E2D5"
white   = "#BAC2DE"

[[colors.indexed_colors]]
index = 16
color = "#FAB387"  # peach

[[colors.indexed_colors]]
index = 17
color = "#F5E0DC"  # rosewater
